services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: worktrack-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD:?Set SA_PASSWORD in .env (min 8 chars, mixed case, digit, symbol)}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      # `-C` trusts the self-signed cert that the server generates on startup.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    container_name: worktrack-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      # `db` resolves to the SQL Server container over the default compose network.
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=WorkTrack;User Id=sa;Password=${SA_PASSWORD};Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=true"
      AppUrls__ApiBaseUrl: "http://localhost:5000"
      AppUrls__ClientBaseUrl: "http://localhost:5173"
    ports:
      - "5000:8080"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: worktrack-client
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount source for HMR. The named volume preserves the container's
      # node_modules so the host's (possibly Windows-built) install doesn't
      # shadow the alpine one.
      - ./client:/app
      - client_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  mssql_data:
  client_node_modules:
